openapi: 3.0.0
info:
  title: Capture
  description: OpenAPI Specifications for the Capture's API
  version: 1.1.0
  license:
    name: AGPL-3.0
    url: https://github.com/bluewave-labs/capture/blob/develop/LICENSE
servers:
  - url: http://localhost:{PORT}
    description: Local development server
    variables:
      PORT:
        default: '59232'
        description: Port number
        enum:
          - '59232'
paths:
  /health:
    get:
      summary: Check if the server is healthy or not
      responses:
        '200':
          description: Server is healthy
          content:
            application/json:
              schema:
                type: string
                example: "OK"
  /api/v1/metrics:
    get:
      summary: Read server data
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AllMetricResponse'
        '207':
          description: Multi-Status | Some of the data is not available
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AllMetricResponse'
      security:
        - type: http
          scheme: bearer
          bearerFormat: JWT
  /api/v1/metrics/cpu:
    get:
      summary: Read CPU data
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CPUMetricResponse'
        '207':
          description: Multi-Status | Some of the data is not available
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CPUMetricResponse'
      security:
        - type: http
          scheme: bearer
          bearerFormat: JWT
  /api/v1/metrics/memory:
    get:
      summary: Read Memory data
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MemoryMetricResponse'
        '207':
          description: Multi-Status | Some of the data is not available
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MemoryMetricResponse'
      security:
        - type: http
          scheme: bearer
          bearerFormat: JWT
  /api/v1/metrics/disk:
    get:
      summary: Read Disk data
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DiskMetricResponse'
        '207':
          description: Multi-Status | Some of the data is not available
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DiskMetricResponse'
      security:
        - type: http
          scheme: bearer
          bearerFormat: JWT
  /api/v1/metrics/host:
    get:
      summary: Read Host data
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HostMetricResponse'
        '207':
          description: Multi-Status | Some of the data is not available
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HostMetricResponse'
      security:
        - type: http
          scheme: bearer
          bearerFormat: JWT
  /api/v1/metrics/smart:
    get:
      summary: Read S.M.A.R.T. data
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SmartMetricResponse'
        '207':
          description: Multi-Status | Some of the data is not available
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SmartMetricResponse'
      security:
        - type: http
          scheme: bearer
          bearerFormat: JWT
  /api/v1/metrics/net:
    get:
      summary: Read Network data
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NetworkMetricResponse'
        '207':
          description: Multi-Status | Some of the data is not available
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NetworkMetricResponse'
      security:
        - type: http
          scheme: bearer
          bearerFormat: JWT
  /api/v1/metrics/docker:
    get:
      summary: Read Docker container metrics
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DockerMetricResponse'
        '207':
          description: Multi-Status | Some of the data is not available
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DockerMetricResponse'
        '403':
          description: Forbidden - Invalid authentication token
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                    example: "Invalid token provided"
      security:
        - type: http
          scheme: bearer
          bearerFormat: JWT
  /api/v1/metrics/proxmox:
    get:
      summary: Read Proxmox LXC container metrics
      description: Returns metrics for LXC containers running on a Proxmox VE host. Requires PROXMOX_HOST, PROXMOX_TOKEN_ID, and PROXMOX_TOKEN_SECRET environment variables to be configured. Returns empty data if Proxmox is not configured.
      parameters:
        - name: all
          in: query
          description: Include stopped containers (default false, only running containers)
          required: false
          schema:
            type: boolean
            default: false
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProxmoxMetricResponse'
        '207':
          description: Multi-Status | Some of the data is not available
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProxmoxMetricResponse'
        '403':
          description: Forbidden - Invalid authentication token
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                    example: "Invalid token provided"
      security:
        - type: http
          scheme: bearer
          bearerFormat: JWT
components:
  schemas:
    AllMetricResponse:
      type: object
      properties:
        data:
          type: object
          properties:
            cpu:
              $ref: '#/components/schemas/CPUData'
            memory:
              $ref: '#/components/schemas/MemoryData'
            disk:
              type: array
              items:
                $ref: '#/components/schemas/DiskData'
            host:
              $ref: '#/components/schemas/HostData'
            net:
              type: array
              items:
                $ref: '#/components/schemas/NetData'
        capture:
          $ref: '#/components/schemas/CaptureMetadata'
        errors:
          type: array
          nullable: true
          items:
            $ref: '#/components/schemas/MetricErrorObject'
    CPUMetricResponse:
      type: object
      properties:
        data:
          $ref: '#/components/schemas/CPUData'
        capture:
          $ref: '#/components/schemas/CaptureMetadata'
        errors:
          type: array
          nullable: true
          items:
            $ref: '#/components/schemas/MetricErrorObject'
    MemoryMetricResponse:
      type: object
      properties:
        data:
          $ref: '#/components/schemas/MemoryData'
        capture:
          $ref: '#/components/schemas/CaptureMetadata'
        errors:
          type: array
          nullable: true
          items:
            $ref: '#/components/schemas/MetricErrorObject'
    DiskMetricResponse:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/DiskData'
        capture:
          $ref: '#/components/schemas/CaptureMetadata'
        errors:
          type: array
          nullable: true
          items:
            $ref: '#/components/schemas/MetricErrorObject'
    HostMetricResponse:
      type: object
      properties:
        data:
          $ref: '#/components/schemas/HostData'
        capture:
          $ref: '#/components/schemas/CaptureMetadata'
        errors:
          type: array
          nullable: true
          items:
            $ref: '#/components/schemas/MetricErrorObject'
    CPUData:
      type: object
      properties:
        physical_core:
          type: integer
          example: 4
        logical_core:
          type: integer
          example: 8
        frequency:
          type: number
          example: 2500
        temperature:
          type: array
          nullable: true
          items:
            type: number
            example: [50]
        free_percent:
          type: number
          example: 0.5
        usage_percent:
          type: number
          example: 0.5
    MemoryData:
      type: object
      properties:
        total_bytes:
          type: integer
          example: 1351533568
        available_bytes:
          type: integer
          example: 351533568
        used_bytes:
          type: integer
          example: 1000000000
        usage_percent:
          type: number
          example: 0.2601
    DiskData: 
      type: object
      properties:
        device:
          type: string
          example: "/dev/sda1"
        total_bytes:
          type: integer
          format: uint64
          nullable: true
          example: 1099511627776
        free_bytes:
          type: integer
          format: uint64
          nullable: true
          example: 549755813888
        used_bytes:
          type: integer
          format: uint64
          nullable: true
          example: 549755813888
        usage_percent:
          type: number
          nullable: true
          example: 50.0
        total_inodes:
          type: integer
          format: uint64
          nullable: true
          example: 1000000
        free_inodes:
          type: integer
          format: uint64
          nullable: true
          example: 500000
        used_inodes:
          type: integer
          format: uint64
          nullable: true
          example: 500000
        inodes_usage_percent:
          type: number
          nullable: true
          example: 50.0
        read_bytes:
          type: integer
          format: uint64
          nullable: true
          example: 1024000
        write_bytes:
          type: integer
          format: uint64
          nullable: true
          example: 512000
        read_time:
          type: integer
          format: uint64
          nullable: true
          example: 1000
        write_time:
          type: integer
          format: uint64
          nullable: true
          example: 500
    HostData:
      type: object
      properties:
        os:
          type: string
          example: "linux"
        platform:
          type: string
          example: "debian"
        kernel_version:
          type: string
          example: "5.4.0-42-generic"
    MetricErrorObject:
      type: object
      properties:
        metric:
          type: array
          items:
            type: string
            example: "cpu.temperature"
        err:
          type: string
    NetworkMetricResponse:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/NetData'
        capture:
          $ref: '#/components/schemas/CaptureMetadata'
        errors:
          type: array
          nullable: true
          items:
            $ref: '#/components/schemas/MetricErrorObject'
    SmartMetricResponse:
      type: object
      properties:
        data:
          $ref: '#/components/schemas/SmartData'
        capture:
          $ref: '#/components/schemas/CaptureMetadata'
        errors:
          type: array
          nullable: true
          items:
            $ref: '#/components/schemas/MetricErrorObject'
    CaptureMetadata:
      type: object
      properties:
        version:
          type: string
        mode:
          type: string
    NetData:
      type: object
      properties:
        name:
          type: string
          example: "eth0"
        bytes_sent:
          type: integer
          format: uint64
          example: 1024
        bytes_recv:
          type: integer
          format: uint64
          example: 2048
        packets_sent:
          type: integer
          format: uint64
          example: 100
        packets_recv:
          type: integer
          format: uint64
          example: 200
        err_in:
          type: integer
          format: uint64
          example: 0
        err_out:
          type: integer
          format: uint64
          example: 0
        drop_in:
          type: integer
          format: uint64
          example: 0
        drop_out:
          type: integer
          format: uint64
          example: 0
        fifo_in:
          type: integer
          format: uint64
          example: 0
        fifo_out:
          type: integer
          format: uint64
          example: 0
    SmartData:
      type: object
      properties:
        available_spare:
          type: string
          example: "100%"
        available_spare_threshold:
          type: string
          example: "10%"
        controller_busy_time:
          type: string
          example: "0"
        critical_warning:
          type: string
          example: "0"
        data_units_read:
          type: string
          example: "1234567"
        data_units_written:
          type: string
          example: "7654321"
        host_read_commands:
          type: string
          example: "100000"
        host_write_commands:
          type: string
          example: "50000"
        percentage_used:
          type: string
          example: "5"
        power_cycles:
          type: string
          example: "100"
        power_on_hours:
          type: string
          example: "1000"
        smart_overall_health_self_assessment_test_result:
          type: string
          example: "PASSED"
        temperature:
          type: string
          example: "35C"
        unsafe_shutdowns:
          type: string
          example: "0"
    DockerMetricResponse:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/ContainerData'
        capture:
          $ref: '#/components/schemas/CaptureMetadata'
        errors:
          type: array
          nullable: true
          items:
            $ref: '#/components/schemas/MetricErrorObject'
    ContainerData:
      type: object
      properties:
        container_id:
          type: string
          example: "09e88f793869982fdb86e0ac183a4487a8bcf763179c9bbf2f8d6e25492f23bc"
        container_name:
          type: string
          example: "optimistic_jang"
        status:
          type: string
          enum: ["created", "running", "paused", "restarting", "removing", "exited", "dead"]
          example: "running"
        health:
          $ref: '#/components/schemas/ContainerHealthStatus'
        running:
          type: boolean
          example: true
        base_image:
          type: string
          example: "nginx:latest"
        exposed_ports:
          type: array
          items:
            $ref: '#/components/schemas/PortData'
        started_at:
          type: integer
          format: int64
          example: 1701167445
          description: Unix timestamp
        finished_at:
          type: integer
          format: int64
          example: 0
          description: Unix timestamp
        stats:
          $ref: '#/components/schemas/ContainerStats'
    ContainerHealthStatus:
      type: object
      properties:
        healthy:
          type: boolean
          example: true
        source:
          type: string
          enum: ["container_health_check", "state_based_health_check"]
          example: "state_based_health_check"
        message:
          type: string
          example: "Based on container state"
    PortData:
      type: object
      properties:
        port:
          type: string
          example: "80"
        protocol:
          type: string
          example: "tcp"
    ContainerStats:
      type: object
      properties:
        cpu_percent:
          type: number
          example: 0.00
        memory_usage:
          type: integer
          format: uint64
          example: 4706304
        memory_limit:
          type: integer
          format: uint64
          example: 16101339136
        memory_percent:
          type: number
          example: 0.03
        network_rx_bytes:
          type: integer
          format: uint64
          example: 8030
        network_tx_bytes:
          type: integer
          format: uint64
          example: 126
        block_read_bytes:
          type: integer
          format: uint64
          example: 3580000
        block_write_bytes:
          type: integer
          format: uint64
          example: 3140000
        pids:
          type: integer
          format: uint64
          example: 7
    ProxmoxMetricResponse:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/ProxmoxContainerData'
        capture:
          $ref: '#/components/schemas/CaptureMetadata'
        errors:
          type: array
          nullable: true
          items:
            $ref: '#/components/schemas/MetricErrorObject'
    ProxmoxContainerData:
      type: object
      properties:
        vmid:
          type: integer
          example: 100
          description: Proxmox VM ID
        name:
          type: string
          example: "webserver"
          description: Container name
        node:
          type: string
          example: "pve1"
          description: Proxmox node name
        status:
          type: string
          enum: ["running", "stopped"]
          example: "running"
          description: Container status
        type:
          type: string
          example: "lxc"
          description: Container type (always lxc)
        uptime:
          type: integer
          format: int64
          example: 86400
          description: Container uptime in seconds
        cpu_cores:
          type: integer
          example: 2
          description: Number of CPU cores allocated
        cpu_usage:
          type: number
          example: 0.15
          description: CPU usage as a fraction (0.0 to 1.0 per core)
        memory_used:
          type: integer
          format: uint64
          example: 536870912
          description: Memory used in bytes
        memory_total:
          type: integer
          format: uint64
          example: 2147483648
          description: Total memory allocated in bytes
        memory_usage:
          type: number
          example: 0.25
          description: Memory usage as a fraction (0.0 to 1.0)
        swap_used:
          type: integer
          format: uint64
          example: 0
          description: Swap used in bytes
        swap_total:
          type: integer
          format: uint64
          example: 536870912
          description: Total swap allocated in bytes
        disk_used:
          type: integer
          format: uint64
          example: 5368709120
          description: Disk space used in bytes
        disk_total:
          type: integer
          format: uint64
          example: 21474836480
          description: Total disk space allocated in bytes
        disk_read:
          type: integer
          format: uint64
          example: 1073741824
          description: Total bytes read from disk
        disk_write:
          type: integer
          format: uint64
          example: 536870912
          description: Total bytes written to disk
        network_in:
          type: integer
          format: uint64
          example: 1073741824
          description: Total bytes received
        network_out:
          type: integer
          format: uint64
          example: 268435456
          description: Total bytes sent
